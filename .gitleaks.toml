title = "gitleaks config"

[allowlist]
description = "global allow lists"
paths = [
    '''docs/''',
    '''dist/''',
    '''build/''',
    '''\.min\.js$''',
    '''\.min\.css$''',
    '''package-lock\.json$''',
    '''yarn\.lock$''',
    '''pnpm-lock\.yaml$''',
    '''src/common/constants\.ts$''',
]

[[rules]]
description = "Generic API Key"
id = "generic-api-key"
regex = '''(?i)(api_key|apikey|api-key|access_key|accesskey|secret_key|secretkey)\s*[:=]\s*['"][0-9a-zA-Z]{16,}['"]'''
keywords = ["api", "key", "apikey", "accesskey", "secretkey"]

[rules.allowlist]
regexes = [
    '''privateKeyBase64''',
    '''PRIVATE_KEY_BASE64''',
    '''process\.env\.''',
]

[[rules]]
description = "Private Key"
id = "private-key"
regex = '''(?i)(private[_\s-]?key|priv[_\s-]?key|secret[_\s-]?key)\s*[:=]\s*[\'"][^\'"]{20,}[\'"]'''
keywords = ["private", "key"]

[rules.allowlist]
regexes = [
    '''process\.env\.|env\.|getenv|os\.environ''',
    '''your_local_private_key''',
]
