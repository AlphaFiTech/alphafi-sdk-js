# TruffleHog v3 configuration
# This provides more comprehensive secret detection than gitleaks

# Only scan git history up to this many commits (0 = all history)
max-depth: 0

# Only report verified secrets (reduces false positives significantly)
only-verified: false

# Paths to exclude from scanning
exclude-paths:
  - docs/
  - dist/
  - build/
  - node_modules/
  - coverage/
  - .git/
  - '*.min.js'
  - '*.min.css'
  - package-lock.json
  - yarn.lock
  - pnpm-lock.yaml

# Additional detectors to enable
detectors:
  - aws
  - github
  - gitlab
  - slack
  - generic
  - privatekey
  - stripe
  - npm
  - pypi

# Allow certain patterns (reduce false positives)
allow:
  - 'process\.env\.'
  - 'your_local_private_key'
  - 'your_private_key'
  - 'privateKeyBase64'
  - 'PRIVATE_KEY_BASE64'
  - '<your-.*>'
  - 'example\.com'
  - 'test@example'

# Verification settings
verification:
  # Skip verification for these detector types
  skip:
    - generic
    - privatekey
